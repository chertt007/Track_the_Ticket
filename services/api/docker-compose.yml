services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tracktheticket
      POSTGRES_PASSWORD: tracktheticket
      POSTGRES_DB: tracktheticket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracktheticket"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tracktheticket
      DB_USERNAME: tracktheticket
      DB_PASSWORD: tracktheticket
      AWS_REGION: eu-north-1
      SCREENSHOTS_BUCKET: local-screenshots
      COGNITO_USER_POOL_ID: local
      COGNITO_REGION: eu-north-1
      ENVIRONMENT: local
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
