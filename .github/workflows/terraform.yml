name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

env:
  TF_WORKING_DIR: terraform/environments/prod

jobs:
  terraform:
    name: Plan / Apply
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # needed to post plan output as PR comment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_openrouter_api_key: ${{ secrets.TF_VAR_OPENROUTER_API_KEY }}
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            const body = `#### 📋 Terraform Plan
            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            *Triggered by @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # Push a placeholder image so Lambda can be created on first deploy.
      # On subsequent deploys the real image is already in ECR — this is a no-op.
      - name: Push placeholder image to ECR (first deploy only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REPO="tracktheticket-price-checker"
          ECR_URL="${ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/${REPO}"

          # Ensure the repo exists (idempotent — already created by Terraform Plan or previous run)
          aws ecr create-repository --repository-name "${REPO}" --region us-east-1 2>/dev/null || true

          # Only push if the repo is empty (i.e. first deploy)
          IMAGE_COUNT=$(aws ecr describe-images \
            --repository-name "${REPO}" \
            --region us-east-1 \
            --query 'length(imageDetails)' \
            --output text 2>/dev/null || echo "0")

          if [ "${IMAGE_COUNT}" = "0" ] || [ "${IMAGE_COUNT}" = "None" ]; then
            echo "ECR is empty — pushing placeholder so Lambda can be created..."
            aws ecr get-login-password --region us-east-1 \
              | docker login --username AWS --password-stdin "${ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com"
            docker pull public.ecr.aws/lambda/python:3.12
            docker tag public.ecr.aws/lambda/python:3.12 "${ECR_URL}:latest"
            docker push "${ECR_URL}:latest"
          else
            echo "ECR already has ${IMAGE_COUNT} image(s) — skipping placeholder push"
          fi

      # Apply only on direct push to main (not on PR)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_openrouter_api_key: ${{ secrets.TF_VAR_OPENROUTER_API_KEY }}
        run: terraform apply -auto-approve tfplan
