services:

  # ── Link-parser + API backend (FastAPI + Playwright + SQLite) ─────────────
  api:
    build:
      context: ./services/link-parser
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/data/tracktheticket.db
    volumes:
      - api_data:/data
    develop:
      watch:
        - action: sync+restart
          path: ./services/link-parser
          target: /app

  # ── Frontend (Vite dev server with HMR) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - api

volumes:
  api_data:
    # Named volume — survives container recreation, lives on host disk.
    # On Hetzner: /var/lib/docker/volumes/tracktheticket_api_data/_data/
    # Remove only with: docker compose down -v  (intentional action)
